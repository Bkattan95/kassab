<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kassab Åkari AB</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #003F6B; --navy-mid: #004f85; --blue: #006AA7; --blue-light: #0080cc;
      --silver: #c8dce8; --silver-light: #e6f0f7; --white: #f4f8fb;
      --text: #00294a; --text-muted: #4a6e87; --accent: #FECC02;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Barlow', sans-serif; background: var(--white); color: var(--text); overflow-x: hidden; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(13,27,42,0.97); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 68px; border-bottom: 2px solid var(--blue); gap: 1rem;
    }
    .nav-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 1.35rem; font-weight: 700; color: var(--white); letter-spacing: 0.04em; text-decoration: none; flex-shrink: 0; }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--silver); text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-cta { background: var(--blue); color: #fff !important; padding: 0.5rem 1.2rem; border-radius: 3px; transition: background 0.2s !important; }
    .nav-cta:hover { background: var(--blue-light) !important; }

    /* LANG TOGGLE */
    .lang-toggle { display: flex; align-items: center; gap: 0.3rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 20px; padding: 0.28rem 0.35rem; flex-shrink: 0; }
    .lang-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; padding: 0.25rem 0.65rem; border-radius: 14px; border: none; cursor: pointer; transition: background 0.2s, color 0.2s; background: transparent; color: var(--silver); }
    .lang-btn.active { background: var(--blue); color: #fff; }

    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.7s 0.8s forwards; }
    .btn-primary { background: var(--blue); color: #fff; padding: 0.85rem 2rem; font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; border-radius: 3px; transition: background 0.2s, transform 0.15s; display: inline-block; }
    .btn-primary:hover { background: var(--blue-light); transform: translateY(-2px); }
    .btn-outline { border: 2px solid var(--silver); color: var(--silver); padding: 0.83rem 2rem; font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; border-radius: 3px; transition: border-color 0.2s, color 0.2s, transform 0.15s; display: inline-block; }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

    /* STATS */
    .stats-bar { background: var(--navy); border-top: 3px solid var(--blue); display: flex; justify-content: center; flex-wrap: wrap; }
    .stat { padding: 1.6rem 3.5rem; text-align: center; border-right: 1px solid rgba(255,255,255,0.08); }
    .stat:last-child { border-right: none; }
    .stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--silver); margin-top: 0.3rem; }

    /* SECTIONS */
    section { padding: 6rem 8%; }
    .section-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--blue); margin-bottom: 0.7rem; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(2rem, 3.5vw, 3rem); font-weight: 800; text-transform: uppercase; color: var(--navy); line-height: 1.05; margin-bottom: 1.2rem; }
    .section-lead { font-size: 1rem; color: var(--text-muted); line-height: 1.75; max-width: 560px; margin-bottom: 3rem; }

    /* SERVICES */
    #services { background: var(--silver-light); }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; }
    .service-card { background: #fff; border-radius: 4px; padding: 2.2rem 1.8rem; border-top: 4px solid var(--blue); box-shadow: 0 2px 12px rgba(13,27,42,0.07); transition: transform 0.2s, box-shadow 0.2s; }
    .service-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(13,27,42,0.12); }
    .service-icon { font-size: 2.2rem; margin-bottom: 1rem; display: block; }
    .service-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.25rem; font-weight: 700; text-transform: uppercase; color: var(--navy); margin-bottom: 0.6rem; letter-spacing: 0.03em; }
    .service-desc { font-size: 0.93rem; color: var(--text-muted); line-height: 1.7; }

    /* ABOUT */
    #about { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
    .about-image { position: relative; }
    .about-image img { width: 100%; height: 420px; object-fit: cover; border-radius: 4px; display: block; }
    .about-list { list-style: none; margin-top: 1.5rem; }
    .about-list li { display: flex; align-items: flex-start; gap: 0.8rem; font-size: 0.95rem; color: var(--text-muted); padding: 0.6rem 0; border-bottom: 1px solid var(--silver-light); }
    .about-list li::before { content: '✓'; color: var(--blue); font-weight: 700; font-size: 1rem; flex-shrink: 0; margin-top: 0.05rem; }

    /* CONTACT */
    #contact { background: var(--navy); padding: 6rem 8%; }
    #contact .section-title { color: #fff; }
    #contact .section-eyebrow { color: var(--accent); }
    #contact .section-lead { color: var(--silver); }
    .contact-layout { display: grid; grid-template-columns: 1fr 1.1fr; gap: 4rem; align-items: start; }
    .contact-item { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.8rem; }
    .contact-icon { width: 42px; height: 42px; background: var(--blue); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .contact-detail-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--silver); margin-bottom: 0.2rem; }
    .contact-detail-val { font-size: 0.97rem; color: #fff; }
    .contact-form { display: grid; gap: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .contact-form input, .contact-form textarea, .contact-form select { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; padding: 0.85rem 1rem; color: #fff; font-family: 'Barlow', sans-serif; font-size: 0.93rem; outline: none; transition: border-color 0.2s; }
    .contact-form input::placeholder, .contact-form textarea::placeholder { color: rgba(255,255,255,0.35); }
    .contact-form input:focus, .contact-form textarea:focus, .contact-form select:focus { border-color: var(--blue); }
    .contact-form select option { background: var(--navy); }
    .contact-form textarea { resize: vertical; min-height: 130px; }
    .contact-form .btn-primary { width: 100%; text-align: center; cursor: pointer; border: none; font-size: 1rem; }

    /* FOOTER */
    footer { background: #080f18; padding: 2rem 8%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .footer-logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--silver); letter-spacing: 0.05em; }
    .footer-logo span { color: var(--accent); }
    footer p { font-size: 0.8rem; color: var(--text-muted); }


    /* CLIENTS TICKER */
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .clients-section { background: var(--white); padding: 4rem 0 3rem; border-top: 1px solid var(--silver-light); border-bottom: 1px solid var(--silver-light); }
    .clients-heading { text-align: center; padding: 0 8%; margin-bottom: 2.5rem; }
    .clients-track-wrap { overflow: hidden; position: relative; }
    .clients-track-wrap::before, .clients-track-wrap::after { content: ''; position: absolute; top: 0; bottom: 0; width: 120px; z-index: 2; pointer-events: none; }
    .clients-track-wrap::before { left: 0; background: linear-gradient(to right, var(--white), transparent); }
    .clients-track-wrap::after  { right: 0; background: linear-gradient(to left,  var(--white), transparent); }
    .clients-track { display: flex; align-items: center; width: max-content; animation: ticker 32s linear infinite; }
    .clients-track:hover { animation-play-state: paused; }
    .client-item { display: flex; align-items: center; padding: 0.6rem 3rem; border-right: 1px solid var(--silver-light); flex-shrink: 0; }
    .client-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); opacity: 0.55; transition: opacity 0.3s, color 0.3s; white-space: nowrap; }
    .client-item:hover .client-name { opacity: 1; color: var(--blue); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 900px) { #about { grid-template-columns: 1fr; gap: 3rem; } .about-badge { bottom: 1rem; right: 1rem; } .contact-layout { grid-template-columns: 1fr; gap: 3rem; } .form-row { grid-template-columns: 1fr; } .stat { padding: 1.4rem 2rem; } }
    @media (max-width: 640px) { nav { padding: 0 4%; } .nav-links { display: none; } #home { padding: 0 5%; padding-top: 68px; } section { padding: 4rem 5%; } #contact { padding: 4rem 5%; } footer { padding: 1.5rem 5%; flex-direction: column; text-align: center; } }
  </style>
</head>

let lang = 'en';

function setLang(l) {
  lang = l;
  const t = T[l];
  document.querySelectorAll('[data-key]').forEach(el => {
    const k = el.getAttribute('data-key');
    if (t[k] !== undefined) el.innerHTML = t[k];
  });
  document.querySelectorAll('[data-placeholder-key]').forEach(el => {

  document.getElementById('btn-sv').classList.toggle('active', l === 'sv');

}
